async function callEngine(messages, system, max_tokens = 2048) {
  const res = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, system, max_tokens }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error || 'Engine error');
  return data.text;
}

const SUGGESTIONS = [
  'Walk me through specific personal jurisdiction post-Ford',
  'Compare Crawford testimonial vs nontestimonial with examples',
  'Mini-outline on the dormant Commerce Clause',
  'Felony murder: merger doctrine and agency theory',
  'Top 10 NY-specific MEE traps',
  'Hearsay 803 exceptions flashcards',
];

function AskView() {
  const [messages, setMessages] = useState(() => ls.get('bar:chat') || []);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [saved, setSaved] = useState(() => ls.get('bar:saved') || []);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const send = async (text) => {
    const q = (text || input).trim();
    if (!q || loading) return;
    const next = [...messages, { role: 'user', content: q }];
    setMessages(next);
    setInput('');
    setLoading(true);
    try {
      const reply = await callEngine(next.map(m => ({ role: m.role, content: m.content })), SYSTEM_PROMPT, 2048);
      const after = [...next, { role: 'assistant', content: reply }];
      setMessages(after);
      ls.set('bar:chat', after.slice(-50));
    } catch (e) {
      const after = [...next, { role: 'assistant', content: '[Error] ' + e.message }];
      setMessages(after);
    }
    setLoading(false);
  };

  const saveAnswer = () => {
    if (messages.length < 2) return;
    const a = messages[messages.length - 1];
    const q = messages[messages.length - 2];
    if (a.role !== 'assistant') return;
    const next = [{ id: Date.now().toString(), q: q.content, a: a.content }, ...saved].slice(0, 100);
    setSaved(next);
    ls.set('bar:saved', next);
  };

  const clear = () => {
    setMessages([]);
    ls.set('bar:chat', []);
  };

  return html`
    <div class="fade-in">
      <div style=${{ marginBottom: 18 }}>
        <h1 class="serif" style=${{ fontSize: 28, fontWeight: 400, letterSpacing: '-0.02em', margin: 0 }}>Ask the engine</h1>
        <p style=${{ color: 'var(--text-2)', fontSize: 14, marginTop: 4 }}>Rule-first answers, NY distinctions surfaced, examiner traps flagged.</p>
      </div>

      ${messages.length === 0 ? html`
        <div style=${{ display: 'grid', gap: 8, marginBottom: 20 }}>
          ${SUGGESTIONS.map(s => html`
            <button onClick=${() => send(s)} style=${{
              padding: '14px 16px', background: 'white', border: '1px solid var(--border)', borderRadius: 12,
              textAlign: 'left', fontSize: 14, color: 'var(--text)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
            }}>
              <span style=${{ display: 'flex', alignItems: 'center', gap: 10 }}>${Icon.spark()} ${s}</span>
              ${Icon.arrow()}
            </button>
          `)}
        </div>
      ` : html`
        <div ref=${scrollRef} style=${{ maxHeight: '60vh', overflowY: 'auto', marginBottom: 12, paddingRight: 4 }}>
          ${messages.map((m, i) => html`<${Bubble} key=${i} role=${m.role} content=${m.content} />`)}
          ${loading && html`
            <div style=${{ padding: '12px 14px', background: 'white', border: '1px solid var(--border)', borderRadius: 12, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 8, color: 'var(--text-2)', fontSize: 13 }}>
              ${Icon.spin()} Researching...
            </div>
          `}
        </div>
      `}

      <div style=${{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        <textarea
          value=${input}
          onInput=${e => setInput(e.target.value)}
          onKeyDown=${e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) send(); }}
          placeholder="Ask anything. Cmd+Enter to send."
          rows=${2}
          style=${{ flex: 1, padding: '12px 14px', border: '1px solid var(--border)', borderRadius: 12, fontSize: 14, background: 'white', resize: 'none' }}
        />
        <button onClick=${() => send()} disabled=${loading || !input.trim()} style=${{
          padding: '12px 16px', background: 'var(--text)', color: 'white', border: 'none', borderRadius: 12,
          display: 'flex', alignItems: 'center', gap: 6, opacity: (!input.trim() || loading) ? 0.4 : 1, fontWeight: 500, fontSize: 14,
        }}>${Icon.send()} Send</button>
      </div>

      ${messages.length > 0 && html`
        <div style=${{ marginTop: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: 'var(--text-2)' }}>
          <span>${messages.length} messages</span>
          <div style=${{ display: 'flex', gap: 8 }}>
            <button onClick=${saveAnswer} style=${{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 8px', fontSize: 11, color: 'var(--text-2)', display: 'inline-flex', alignItems: 'center', gap: 4 }}>${Icon.save()} Save last</button>
            <button onClick=${clear} style=${{ background: 'none', border: 'none', color: 'var(--accent)', fontSize: 12, fontWeight: 500, padding: 0 }}>Clear thread</button>
          </div>
        </div>
      `}

      ${saved.length > 0 && messages.length === 0 && html`
        <div style=${{ marginTop: 32 }}>
          <h3 class="serif" style=${{ fontSize: 18, fontWeight: 500, marginBottom: 12 }}>Saved (${saved.length})</h3>
          <div style=${{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            ${saved.slice(0, 5).map(s => html`
              <div key=${s.id} style=${{ padding: 12, background: 'white', border: '1px solid var(--border)', borderRadius: 10 }}>
                <div style=${{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>${s.q.slice(0, 100)}${s.q.length > 100 ? '...' : ''}</div>
                <div style=${{ fontSize: 12.5, color: 'var(--text-2)', whiteSpace: 'pre-wrap' }}>${s.a.slice(0, 200)}...</div>
              </div>
            `)}
          </div>
        </div>
      `}
    </div>
  `;
}

function Bubble({ role, content }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    try { navigator.clipboard.writeText(content); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch {}
  };
  const isError = content.startsWith('[Error]');
  return html`
    <div style=${{
      padding: '12px 14px',
      background: role === 'user' ? 'var(--cream)' : (isError ? 'var(--warn-bg)' : 'white'),
      border: '1px solid var(--border)', borderRadius: 12, marginBottom: 8,
    }}>
      <div style=${{ fontSize: 10, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 6 }}>
        ${role === 'user' ? 'You' : 'Engine'}
      </div>
      <div style=${{ fontSize: 14, lineHeight: 1.55, color: 'var(--text)', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>${content}</div>
      ${role === 'assistant' && !isError && html`
        <button onClick=${copy} style=${{ marginTop: 8, padding: '4px 8px', background: 'none', border: '1px solid var(--border)', borderRadius: 6, fontSize: 11, color: 'var(--text-2)', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          ${copied ? Icon.check() : Icon.copy()} ${copied ? 'Copied' : 'Copy'}
        </button>
      `}
    </div>
  `;
}

      setPrompt(out);
    } catch (e) {

    }
    setLoading(false);
  };

  const grade = async () => {

    setLoading(true);
    try {
      const sys = `You are a NYBOLE grader evaluating an MEE essay. Score the response 1-6 on each dimension:

1. **Issue identification** - every issue spotted?
2. **Rule statement accuracy** - black-letter rules correct?

    } catch (e) {

        <button onClick=${() => setMode('generate')} style=${pill(mode === 'generate')}>Generate prompt</button>
      </div>

      ${mode === 'generate' && html`
        <div>
          <div style=${{ display: 'flex', gap: 8, marginBottom: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <select value=${subject} onChange=${e => setSubject(e.target.value)} style=${input}>
              ${SUBJECTS.map(s => html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}
            </select>
            <button onClick=${generate} disabled=${loading} style=${{ ...btnPrimary, opacity: loading ? 0.4 : 1 }}>
              ${loading ? html`${Icon.spin()} Generating...` : html`${Icon.spark('white')} Generate prompt`}
            </button>
          </div>
          ${generated && html`<div style=${{ padding: 18, background: 'white', border: '1px solid var(--border)', borderRadius: 12, fontSize: 14, lineHeight: 1.6, whiteSpace: 'pre-wrap' }}>${generated}</div>`}
        </div>
      `}

      ${mode === 'grade' && html`
        <div>
          <div style=${{ fontSize: 10, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 6 }}>The prompt</div>
          <textarea value=${prompt} onInput=${e => setPrompt(e.target.value)} rows=${4} placeholder="Paste the essay prompt..." style=${{ ...input, width: '100%', resize: 'vertical', lineHeight: 1.5 }} />
          <div style=${{ marginTop: 12, fontSize: 10, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 6 }}>Your response</div>
          <textarea value=${response} onInput=${e => setResponse(e.target.value)} rows=${12} placeholder="Write your IRAC response here..." style=${{ ...input, width: '100%', resize: 'vertical', lineHeight: 1.5 }} />
          <div style=${{ marginTop: 12, display: 'flex', gap: 8 }}>
            <button onClick=${grade} disabled=${loading || !response.trim() || !prompt.trim()} style=${{ ...btnPrimary, opacity: (loading || !response.trim() || !prompt.trim()) ? 0.4 : 1 }}>
              ${loading ? html`${Icon.spin()} Grading...` : html`${Icon.spark('white')} Grade it`}
            </button>
          </div>
          ${feedback && html`
            <div style=${{ marginTop: 20, padding: 18, background: 'white', border: '1px solid var(--border)', borderRadius: 12 }}>
              <div style=${{ fontSize: 10, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 12 }}>Grader feedback</div>
              <div style=${{ fontSize: 13.5, lineHeight: 1.6, whiteSpace: 'pre-wrap' }}>${feedback}</div>
            </div>
          `}
        </div>
      `}
    </div>
  `;
}

// ============================================================================
// FLASHCARDS
// ============================================================================
function CardsView() {
  const [decks, setDecks] = useState(() => ls.get('bar:decks') || []);
  const [activeDeck, setActiveDeck] = useState(null);
  const [studyIndex, setStudyIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [topic, setTopic] = useState('');
  const [subject, setSubject] = useState('contracts');

  const generate = async () => {
    if (!topic.trim()) return;
    setGenerating(true);
    try {
      const subjectName = SUBJECTS.find(s => s.id === subject)?.name || subject;
      const sys = `You are a bar prep flashcard generator. Generate 8-12 flashcards covering the topic. Each card: Q = question or rule prompt; A = precise black-letter answer with key nuances. Format STRICTLY as JSON array, NO other text, NO markdown fences:
[{"q":"...", "a":"..."}, ...]`;
      const out = await callEngine([{ role: 'user', content: `Subject: ${subjectName}\nTopic: ${topic}\n\nGenerate the flashcards.` }], sys, 2000);
      const clean = out.replace(/```json\n?|```/g, '').trim();
      let cards = [];
      try { cards = JSON.parse(clean); } catch {}
      if (cards.length === 0) {
        alert('Could not generate cards. Try again.');
        setGenerating(false);
        return;
      }
      const deck = { id: Date.now().toString(), name: topic, subject: subjectName, cards };
      const next = [deck, ...decks];
      setDecks(next);
      ls.set('bar:decks', next);
      setTopic('');
    } catch (e) {
      alert('Generation error: ' + e.message);
    }
    setGenerating(false);
  };

  const deleteDeck = (id) => {
    const next = decks.filter(d => d.id !== id);
    setDecks(next);
    ls.set('bar:decks', next);
  };

  if (activeDeck) {
    const card = activeDeck.cards[studyIndex];
    return html`
      <div class="fade-in">
        <button onClick=${() => { setActiveDeck(null); setStudyIndex(0); setFlipped(false); }} style=${{ background: 'none', border: 'none', color: 'var(--text-2)', fontSize: 13, marginBottom: 14, display: 'flex', alignItems: 'center', gap: 4, padding: 0 }}>
          ${Icon.back()} Back to decks
        </button>
        <h1 class="serif" style=${{ fontSize: 24, fontWeight: 400, letterSpacing: '-0.02em', margin: 0, marginBottom: 4 }}>${activeDeck.name}</h1>
        <div class="tnum" style=${{ fontSize: 12, color: 'var(--text-2)', marginBottom: 20 }}>${studyIndex + 1} of ${activeDeck.cards.length}</div>
        <div onClick=${() => setFlipped(!flipped)} style=${{
          padding: 28, background: 'white', border: '1px solid var(--border)', borderRadius: 16,
          minHeight: 280, cursor: 'pointer', display: 'flex', flexDirection: 'column', justifyContent: 'center',
        }}>
          <div style=${{ fontSize: 10, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: 16 }}>
            ${flipped ? 'Answer' : 'Question'}
          </div>
          <div class="serif" style=${{ fontSize: 19, lineHeight: 1.45, fontWeight: flipped ? 400 : 500 }}>${flipped ? card.a : card.q}</div>
          <div style=${{ marginTop: 20, fontSize: 11, color: 'var(--text-3)', textAlign: 'center' }}>Tap to ${flipped ? 'show question' : 'reveal answer'}</div>
        </div>
        <div style=${{ marginTop: 16, display: 'flex', gap: 8, justifyContent: 'space-between' }}>
          <button onClick=${() => { setStudyIndex(Math.max(0, studyIndex - 1)); setFlipped(false); }} disabled=${studyIndex === 0} style=${{ ...btnSecondary, opacity: studyIndex === 0 ? 0.4 : 1 }}>
            ${Icon.back()} Prev
          </button>
          <button onClick=${() => { setStudyIndex(Math.min(activeDeck.cards.length - 1, studyIndex + 1)); setFlipped(false); }} disabled=${studyIndex === activeDeck.cards.length - 1} style=${{ ...btnPrimary, opacity: studyIndex === activeDeck.cards.length - 1 ? 0.4 : 1 }}>
            Next ${Icon.arrow()}
          </button>
        </div>
      </div>
    `;
  }

  return html`
    <div class="fade-in">
      <div style=${{ marginBottom: 18 }}>
        <h1 class="serif" style=${{ fontSize: 28, fontWeight: 400, letterSpacing: '-0.02em', margin: 0 }}>Flashcards</h1>
        <p style=${{ color: 'var(--text-2)', fontSize: 14, marginTop: 4 }}>Generate decks on demand. Saved automatically.</p>
      </div>
      <div style=${{ padding: 16, background: 'white', border: '1px solid var(--border)', borderRadius: 12, marginBottom: 20 }}>
        <div style=${{ display: 'grid', gridTemplateColumns: 'minmax(140px, 1fr) 2fr auto', gap: 8 }}>
          <select value=${subject} onChange=${e => setSubject(e.target.value)} style=${input}>
            ${SUBJECTS.map(s => html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}
          </select>
          <input value=${topic} onInput=${e => setTopic(e.target.value)} placeholder="Topic e.g. Hearsay exceptions" style=${input} />
          <button onClick=${generate} disabled=${generating || !topic.trim()} style=${{ ...btnPrimary, opacity: (generating || !topic.trim()) ? 0.4 : 1 }}>
            ${generating ? html`${Icon.spin()}` : html`${Icon.plus()}`}
          </button>
        </div>
      </div>
      ${decks.length === 0 ? html`
        <div style=${{ padding: 40, background: 'white', border: '1px dashed var(--border)', borderRadius: 12, textAlign: 'center', color: 'var(--text-2)' }}>
          No decks yet. Generate your first above.
        </div>
      ` : html`
        <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 12 }}>
          ${decks.map(d => html`
            <div key=${d.id} style=${{ padding: 16, background: 'white', border: '1px solid var(--border)', borderRadius: 12, display: 'flex', flexDirection: 'column' }}>
              <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 6 }}>
                <div class="serif" style=${{ fontSize: 16, fontWeight: 500, lineHeight: 1.3 }}>${d.name}</div>
                <button onClick=${() => deleteDeck(d.id)} style=${{ background: 'none', border: 'none', padding: 4, cursor: 'pointer' }}>${Icon.trash()}</button>
              </div>
              <div style=${{ fontSize: 11, color: 'var(--text-2)', marginTop: 4 }}>${d.subject}</div>
              <div class="tnum" style=${{ fontSize: 11, color: 'var(--text-2)', marginTop: 8 }}>${d.cards.length} cards</div>
              <button onClick=${() => { setActiveDeck(d); setStudyIndex(0); setFlipped(false); }} style=${{ ...btnPrimary, marginTop: 12, justifyContent: 'center' }}>Study</button>
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

// ============================================================================
// SETTINGS
// ============================================================================
function SettingsView({ settings, onSave }) {
  const [form, setForm] = useState(settings);
  const dirty = JSON.stringify(form) !== JSON.stringify(settings);

  const clearAll = () => {
    if (!confirm('Clear all chat history, decks, and saved answers? This cannot be undone.')) return;
    ['bar:chat', 'bar:saved', 'bar:decks'].forEach(k => localStorage.removeItem(k));
    alert('Cleared. Reload the page.');
  };

  return html`
    <div class="fade-in" style=${{ maxWidth: 560 }}>
      <h1 class="serif" style=${{ fontSize: 28, fontWeight: 400, letterSpacing: '-0.02em', margin: 0, marginBottom: 20 }}>Settings</h1>
      <div style=${{ padding: 18, background: 'white', border: '1px solid var(--border)', borderRadius: 12 }}>
        <label style=${{ display: 'block', marginBottom: 12 }}>
          <span style=${{ fontSize: 11, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, display: 'block', marginBottom: 6 }}>Name</span>
          <input value=${form.name} onInput=${e => setForm({ ...form, name: e.target.value })} style=${{ ...input, width: '100%' }} />
        </label>
        <label style=${{ display: 'block', marginBottom: 12 }}>
          <span style=${{ fontSize: 11, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600, display: 'block', marginBottom: 6 }}>Exam date</span>
          <input type="date" value=${form.examDate} onInput=${e => setForm({ ...form, examDate: e.target.value })} style=${{ ...input, width: '100%' }} />
        </label>
        ${dirty && html`
          <div style=${{ marginTop: 16, display: 'flex', gap: 8 }}>
            <button onClick=${() => onSave(form)} style=${btnPrimary}>Save</button>
            <button onClick=${() => setForm(settings)} style=${btnSecondary}>Cancel</button>
          </div>
        `}
      </div>
      <div style=${{ marginTop: 16, padding: 16, background: 'var(--cream)', border: '1px solid var(--border)', borderRadius: 12, fontSize: 12.5, lineHeight: 1.55 }}>
        <strong>About this engine.</strong> Pre-loaded with high-yield outlines for the 8 UBE subjects tested July 2026 onward. NCBE dropped Conflict of Laws, Family Law, T&amp;E, and Secured Transactions from the MEE effective July 2026. Always verify against the latest NCBE and NYBOLE materials.
      </div>
      <div style=${{ marginTop: 16 }}>
        <button onClick=${clearAll} style=${{ ...btnSecondary, color: 'var(--accent)', borderColor: 'var(--border)' }}>${Icon.trash()} Clear all local data</button>
      </div>
    </div>
  `;
}
